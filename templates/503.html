{% extends "base.html" %}
{% block content %}
{% load static %}

<section>
  <div class="bg-white dark:bg-gray-900">
    <div class="flex h-screen">
      <div class="m-auto text-center">
        <div class="mb-8">
          <h1 class="text-9xl font-bold text-yellow-600 dark:text-yellow-400">503</h1>
        </div>
        <p class="text-2xl md:text-3xl font-semibold text-gray-800 dark:text-white mb-4">
          Service temporairement indisponible
        </p>
        <p class="text-sm md:text-base text-gray-600 dark:text-gray-300 p-2 mb-8 max-w-md mx-auto">
          Le service est actuellement en maintenance ou temporairement surchargé. Veuillez réessayer dans quelques instants.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a href="/"
            class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow hover:shadow-lg py-3 px-6 transition-all duration-300 inline-block">
            <i class="fas fa-home mr-2"></i>Retour à l'accueil
          </a>
          <button onclick="location.reload()"
            class="bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow hover:shadow-lg py-3 px-6 transition-all duration-300 inline-block">
            <i class="fas fa-redo mr-2"></i>Réessayer
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
