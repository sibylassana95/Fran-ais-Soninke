{% load static %}
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoniTrad - Traducteur Français-Soninké</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <link rel="apple-touch-icon" href="{% static 'icons/icon-192x192.png' %}">
   <!-- Favicon -->
    <link rel="icon" href="{% static 'icons/icon-192x192.png' %}" type="image/png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Tailwind CSS (CDN for development, consider compiling for production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">
   
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-50 dark:bg-gray-900 flex flex-col font-sans transition-all duration-300">
    
    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 fixed w-full z-50 transition-all duration-300 shadow-sm">
      <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center h-14">
          <a href="/" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center text-white">
              <i class="fas fa-language text-sm"></i>
            </div>
            <span class="text-lg font-bold text-gray-900 dark:text-white">SoniTrad</span>
          </a>
          
          <div class="flex items-center gap-2">
            <button id="theme-toggle" class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
              <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
              </svg>
              <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
              </svg>
            </button>
            <button class="mobile-menu-button p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Mobile menu -->
      <div class="mobile-menu hidden bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
        <div class="px-4 py-3 space-y-1">
          <a href="/" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors">
            <i class="fas fa-home w-5"></i>
            <span class="font-medium">Accueil</span>
          </a>
          <a href="{% url 'about' %}" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors">
            <i class="fas fa-info-circle w-5"></i>
            <span class="font-medium">À propos</span>
          </a>
          <a href="{% url 'contribution' %}" class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors">
            <i class="fas fa-plus-circle w-5"></i>
            <span class="font-medium">Contribuer</span>
          </a>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-grow pt-14">
      {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-auto">
      <div class="max-w-7xl mx-auto py-6 px-4">
        <div class="flex flex-col items-center gap-4">
          <div class="flex gap-4">
            <a href="https://paypal.me/sibylassana" target="_blank" class="text-gray-400 hover:text-blue-600 transition-colors" aria-label="PayPal">
              <i class="fab fa-paypal text-xl"></i>
            </a>
            <a href="https://www.buymeacoffee.com/sibyamara9M" target="_blank" class="text-gray-400 hover:text-yellow-500 transition-colors" aria-label="Buy Me a Coffee">
              <i class="fas fa-coffee text-xl"></i>
            </a>
            <a href="https://www.linkedin.com/in/sibylassana" target="_blank" class="text-gray-400 hover:text-blue-700 transition-colors" aria-label="LinkedIn">
              <i class="fab fa-linkedin text-xl"></i>
            </a>
            <a href="https://github.com/sibylassana95" target="_blank" class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors" aria-label="GitHub">
              <i class="fab fa-github text-xl"></i>
            </a>
          </div>
          <p id="currentYear" class="text-sm text-gray-500 dark:text-gray-400"></p>
        </div>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register("{% static 'sw.js' %}")
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>

    <script>
      // Mobile Menu Toggle
      const mobileMenuButton = document.querySelector('.mobile-menu-button');
      const mobileMenu = document.querySelector('.mobile-menu');

      mobileMenuButton.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });

      // Year
      document.getElementById("currentYear").innerHTML = "© " + new Date().getFullYear() + " Tous droits réservés";

      // Django Messages
      {% for message in messages %}
        swal({
          title: "{{ message.tags|title }}",
          text: "{{ message }}",
          icon: "{{ message.tags }}",
          button: "OK",
        });
      {% endfor %}

      // AJAX Search Suggestions with enhanced UX
      $(document).ready(function() {
        let searchTimeout;
        
        $("#phrase_francaise").on("input", function() {
          var phrase = $(this).val();
          
          // Clear previous timeout
          clearTimeout(searchTimeout);
          
          // Add loading state
          const suggestionsSelect = $("#suggestions_francais");
          
          if (phrase.length >= 2) {
            suggestionsSelect.html('<option value="">🔍 Recherche en cours...</option>');
            
            // Debounce the search
            searchTimeout = setTimeout(() => {
              $.ajax({
                url: '{% url "suggestions" %}',
                data: { phrase: phrase },
                beforeSend: function() {
                  suggestionsSelect.html('<option value="">⏳ Chargement...</option>');
                },
                success: function(data) {
                  var options = '<option value="">💡 ' + data.length + ' suggestion(s) trouvée(s)</option>';
                  $.each(data, function(index, value) {
                    options += '<option value="' + value + '">📝 ' + value + '</option>';
                  });
                  suggestionsSelect.html(options);
                  
                  // Add subtle animation
                  suggestionsSelect.addClass('animate-fade-in-up');
                },
                error: function(xhr, status, error) {
                  console.error("Erreur AJAX:", error);
                  suggestionsSelect.html('<option value="">❌ Erreur de chargement</option>');
                }
              });
            }, 300); // 300ms debounce
          } else {
            suggestionsSelect.html('<option value="">✏️ Tapez au moins 2 caractères...</option>');
          }
        });

        $("#suggestions_francais").on("change", function() {
          var selectedValue = $(this).val();
          if (selectedValue && !selectedValue.includes('suggestion') && !selectedValue.includes('Tapez')) {
             $("#phrase_francaise").val(selectedValue).focus();
             
             // Add visual feedback
             $(this).addClass('bg-green-50 dark:bg-green-900/20');
             setTimeout(() => {
               $(this).removeClass('bg-green-50 dark:bg-green-900/20');
             }, 1000);
          }
        });
      });

      // Theme Toggle Logic
      var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
      var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

      // Change the icons inside the button based on previous settings
      if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          themeToggleLightIcon.classList.remove('hidden');
          document.documentElement.classList.add('dark');
      } else {
          themeToggleDarkIcon.classList.remove('hidden');
          document.documentElement.classList.remove('dark');
      }

      var themeToggleBtn = document.getElementById('theme-toggle');

      themeToggleBtn.addEventListener('click', function() {
          // toggle icons inside button
          themeToggleDarkIcon.classList.toggle('hidden');
          themeToggleLightIcon.classList.toggle('hidden');

          // if set via local storage previously
          if (localStorage.getItem('color-theme')) {
              if (localStorage.getItem('color-theme') === 'light') {
                  document.documentElement.classList.add('dark');
                  localStorage.setItem('color-theme', 'dark');
              } else {
                  document.documentElement.classList.remove('dark');
                  localStorage.setItem('color-theme', 'light');
              }
          } else {
              // if NOT set via local storage previously
              if (document.documentElement.classList.contains('dark')) {
                  document.documentElement.classList.remove('dark');
                  localStorage.setItem('color-theme', 'light');
              } else {
                  document.documentElement.classList.add('dark');
                  localStorage.setItem('color-theme', 'dark');
              }
          }
      });



    </script>
  </body>
</html>
